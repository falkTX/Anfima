<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="cache-control" content="no-cache" />
    <link rel="stylesheet" type="text/css" href="uikit/uikit-css.min.css?v=@UIKIT_VERSION@">
    <title>Anfima</title>
  </head>
<!--    -->
<!-- data-uk-height-viewport -->
  <body class="anfima-welcome uk-background-secondary uk-light uk-height-viewport">

    <!-- modals -->
    <form class="uk-modal" id="anfima-modal-file-rename" uk-modal>
      <div class="uk-modal-dialog">
        <div class="uk-modal-body uk-background-secondary">
          <label>Name:</label>
          <input class="uk-input" type="text" autofocus required>
        </div>
        <div class="uk-modal-footer uk-background-secondary uk-text-right">
          <button class="uk-button uk-button-default uk-modal-close" type="button">Cancel</button>
          <button class="uk-button uk-button-primary" href="#anfima-modal-report" id="anfima-modal-file-rename-submit" type="submit">Rename</button>
        </div>
      </div>
    </form>

    <div class="uk-modal" id="anfima-modal-report" uk-modal>
      <div class="uk-modal-dialog">
        <div class="uk-modal-body uk-background-secondary">
          <p>If you see this message, something went wrong!</p>
        </div>
        <div class="uk-modal-footer uk-background-secondary uk-text-right">
          <button class="uk-button uk-button-default uk-modal-close" type="button">Close</button>
        </div>
      </div>
    </div>
    <!-- /modals -->

    <!-- navbar -->
    <nav class="uk-navbar-container uk-navbar-transparent">
      <div class="uk-container">
        <div uk-navbar>
          <div class="uk-navbar-left">
            <ul class="uk-navbar-nav">
              <li id="anfima-li-file-manager" class="uk-active"><a href="#">File Manager</a></li>
              <li id="anfima-li-preset-manager"><a href="#">Preset Manager</a></li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
    <!-- /navbar -->

    <!-- main container -->
    <div class="uk-container"> <!--style="background-color:#111;"-->

      <div class="uk-section uk-section-xsmall">
        <div class="uk-container">
          <h3>Welcome</h3>
          <span id="anfima-welcome-status">Welcome to Anfima!</span>
        </div>
      </div>

      <div class="uk-section uk-section-xsmall">
        <div class="uk-container">
          <h3>Tests</h3>
          <button class="uk-button uk-button-default">Test Buttons</button>
        </div>
      </div>

      <div class="uk-section uk-section-xsmall">
        <div class="uk-container">
          <h3>Files</h3>

          <div class="uk-padding-small uk-flex uk-flex-between">
            <div>
              <button id="anfima-file-manager-select-all" class="uk-button uk-button-default">Select All</button>
            </div>
            <div>
              <button class="uk-button uk-button-primary" uk-toggle="target: #file-manager-add">Add...</button>
            </div>
          </div>

          <div class="uk-container" id="anfima-file-manager-container">
            <ul class="uk-list uk-list-collapse uk-list-striped">
            </ul>
          </div>
        </div>
      </div>

    </div>
    <!-- /main container -->

    <script async src="js/backend.js?v=@VERSION@"></script>
    <script async src="js/file-manager.js?v=@VERSION@"></script>
    <script async src="js/backends/dummy.js?v=@VERSION@"></script>
    <script src="uikit/uikit-js.min.js?v=@UIKIT_VERSION@"></script>
    <script async src="uikit/uikit-icons.min.js?v=@UIKIT_VERSION@"></script>
    <!-- main entry point, make sure it is last -->
    <script src="js/anfima.js?v=@VERSION@"></script>
  </body>
</html>
